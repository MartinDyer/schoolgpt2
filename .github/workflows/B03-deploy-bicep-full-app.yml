name: B03 - Deploy Full App (Bicep)

on:
  workflow_dispatch:
    inputs:
      resource_group_name:
        description: 'Target resource group name'
        required: true
        default: 'schoolgpt-production-rg'
        type: string
      location:
        description: 'Azure region'
        required: true
        default: 'uksouth'
        type: string
      school_name:
        description: 'School name used in tags'
        required: true
        default: 'Example School'
        type: string
      environment:
        description: 'Environment name'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      name_prefix:
        description: 'Short safe prefix for generated names'
        required: true
        default: 'schoolgpt'
        type: string
      deploy_ai_foundry:
        description: 'Provision AI Foundry in this deployment'
        required: true
        default: true
        type: boolean
      existing_ai_foundry_endpoint:
        description: 'Existing AI Foundry endpoint when deploy_ai_foundry is false'
        required: false
        default: ''
        type: string
      ai_deployment_name:
        description: 'Azure OpenAI deployment name'
        required: true
        default: 'gpt-4o'
        type: string
      ai_model_name:
        description: 'Azure OpenAI model name'
        required: true
        default: 'gpt-4o'
        type: string
      ai_model_version:
        description: 'Azure OpenAI model version'
        required: true
        default: '2024-11-20'
        type: string
      app_service_sku:
        description: 'App Service plan SKU'
        required: true
        default: 'B2'
        type: string
      sql_sku_name:
        description: 'Azure SQL database SKU'
        required: true
        default: 'S1'
        type: string

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20.x'

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    outputs:
      web_app_name: ${{ steps.names.outputs.web_app_name }}
      resource_group_name: ${{ github.event.inputs.resource_group_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Generate deployment names
        id: names
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            PREFIX=$(printf "%s" "${{ github.event.inputs.name_prefix }}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
            if [ -z "$PREFIX" ]; then PREFIX="schoolgpt"; fi
            HASH=$(printf "%s" "${{ github.event.inputs.resource_group_name }}" | sha256sum | cut -c1-6)
            COMPACT=$(printf "%s%s" "$PREFIX" "$HASH")
            APP_SERVICE_PLAN_NAME="${PREFIX:0:20}-asp"
            WEB_APP_NAME="${COMPACT:0:18}app"
            APP_INSIGHTS_NAME="${PREFIX:0:18}-appi"
            LOG_WORKSPACE_NAME="${PREFIX:0:18}-log"
            KEY_VAULT_NAME="${COMPACT:0:22}kv"
            SQL_SERVER_NAME="${COMPACT:0:20}sql"
            AI_FOUNDRY_NAME="${COMPACT:0:20}ai"
            AI_SUBDOMAIN_NAME="$AI_FOUNDRY_NAME"
            if [ -n "${{ secrets.SQL_ADMIN_PASSWORD }}" ]; then
              SQL_ADMIN_PASSWORD="${{ secrets.SQL_ADMIN_PASSWORD }}"
            else
              SQL_ADMIN_PASSWORD="Sql!$(printf "%s" "${{ github.event.inputs.resource_group_name }}${{ github.event.inputs.name_prefix }}" | sha256sum | cut -c1-16)Aa1"
            fi
            echo "::add-mask::$SQL_ADMIN_PASSWORD"
            echo "app_service_plan_name=$APP_SERVICE_PLAN_NAME" >> $GITHUB_OUTPUT
            echo "web_app_name=$WEB_APP_NAME" >> $GITHUB_OUTPUT
            echo "app_insights_name=$APP_INSIGHTS_NAME" >> $GITHUB_OUTPUT
            echo "log_workspace_name=$LOG_WORKSPACE_NAME" >> $GITHUB_OUTPUT
            echo "key_vault_name=$KEY_VAULT_NAME" >> $GITHUB_OUTPUT
            echo "sql_server_name=$SQL_SERVER_NAME" >> $GITHUB_OUTPUT
            echo "ai_foundry_name=$AI_FOUNDRY_NAME" >> $GITHUB_OUTPUT
            echo "ai_subdomain_name=$AI_SUBDOMAIN_NAME" >> $GITHUB_OUTPUT
            echo "sql_admin_password=$SQL_ADMIN_PASSWORD" >> $GITHUB_OUTPUT

      - name: Create resource group
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az group create --name "${{ github.event.inputs.resource_group_name }}" --location "${{ github.event.inputs.location }}"

      - name: Deploy monitoring
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create --name "b03-monitoring-${GITHUB_RUN_NUMBER}" --resource-group "${{ github.event.inputs.resource_group_name }}" --template-file "./bicep/components/01-monitoring.bicep" --parameters location="${{ github.event.inputs.location }}" environment="${{ github.event.inputs.environment }}" schoolName="${{ github.event.inputs.school_name }}" logAnalyticsWorkspaceName="${{ steps.names.outputs.log_workspace_name }}" appInsightsName="${{ steps.names.outputs.app_insights_name }}"

      - name: Deploy security
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create --name "b03-security-${GITHUB_RUN_NUMBER}" --resource-group "${{ github.event.inputs.resource_group_name }}" --template-file "./bicep/components/02-security.bicep" --parameters location="${{ github.event.inputs.location }}" environment="${{ github.event.inputs.environment }}" schoolName="${{ github.event.inputs.school_name }}" azureTenantId="${{ secrets.AZURE_TENANT_ID }}" keyVaultName="${{ steps.names.outputs.key_vault_name }}" keyVaultAdminObjectId="${{ secrets.KEY_VAULT_ADMIN_OBJECT_ID }}"

      - name: Deploy data
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create --name "b03-data-${GITHUB_RUN_NUMBER}" --resource-group "${{ github.event.inputs.resource_group_name }}" --template-file "./bicep/components/03-data.bicep" --parameters location="${{ github.event.inputs.location }}" environment="${{ github.event.inputs.environment }}" schoolName="${{ github.event.inputs.school_name }}" sqlServerName="${{ steps.names.outputs.sql_server_name }}" sqlDatabaseName="schoolgptdb" sqlAdminLogin="sqladminuser" sqlAdminPassword="${{ steps.names.outputs.sql_admin_password }}" sqlSkuName="${{ github.event.inputs.sql_sku_name }}" sqlAzureAdAdminLogin="" sqlAzureAdAdminObjectId="" azureTenantId="${{ secrets.AZURE_TENANT_ID }}"

      - name: Deploy AI Foundry
        if: github.event.inputs.deploy_ai_foundry == 'true' || github.event.inputs.deploy_ai_foundry == true
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create --name "b03-aifoundry-${GITHUB_RUN_NUMBER}" --resource-group "${{ github.event.inputs.resource_group_name }}" --template-file "./bicep/components/04-ai-foundry.bicep" --parameters location="${{ github.event.inputs.location }}" environment="${{ github.event.inputs.environment }}" schoolName="${{ github.event.inputs.school_name }}" aiFoundryName="${{ steps.names.outputs.ai_foundry_name }}" aiFoundryCustomSubdomain="${{ steps.names.outputs.ai_subdomain_name }}" aiDeploymentName="${{ github.event.inputs.ai_deployment_name }}" aiModelName="${{ github.event.inputs.ai_model_name }}" aiModelVersion="${{ github.event.inputs.ai_model_version }}"

      - name: Deploy app service
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create --name "b03-appservice-${GITHUB_RUN_NUMBER}" --resource-group "${{ github.event.inputs.resource_group_name }}" --template-file "./bicep/components/05-app-service.bicep" --parameters location="${{ github.event.inputs.location }}" environment="${{ github.event.inputs.environment }}" schoolName="${{ github.event.inputs.school_name }}" appServicePlanName="${{ steps.names.outputs.app_service_plan_name }}" appServiceSku="${{ github.event.inputs.app_service_sku }}" webAppName="${{ steps.names.outputs.web_app_name }}"

      - name: Deploy app config
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            AI_FOUNDRY_NAME=""
            if [ "${{ github.event.inputs.deploy_ai_foundry }}" = "true" ]; then AI_FOUNDRY_NAME="${{ steps.names.outputs.ai_foundry_name }}"; fi
            az deployment group create --name "b03-appconfig-${GITHUB_RUN_NUMBER}" --resource-group "${{ github.event.inputs.resource_group_name }}" --template-file "./bicep/components/06-app-config.bicep" --parameters webAppName="${{ steps.names.outputs.web_app_name }}" appInsightsName="${{ steps.names.outputs.app_insights_name }}" keyVaultName="${{ steps.names.outputs.key_vault_name }}" sqlServerName="${{ steps.names.outputs.sql_server_name }}" sqlDatabaseName="schoolgptdb" sqlAdminLogin="sqladminuser" sqlAdminPassword="${{ steps.names.outputs.sql_admin_password }}" aiDeploymentName="${{ github.event.inputs.ai_deployment_name }}" azureOpenAiApiVersion="2025-01-01-preview" deployAiFoundry=${{ github.event.inputs.deploy_ai_foundry }} aiFoundryName="$AI_FOUNDRY_NAME" existingAiFoundryEndpoint="${{ github.event.inputs.existing_ai_foundry_endpoint }}"

      - name: Register deployed app URL in Entra redirect URIs
        shell: bash
        run: |
          set +e
          FRONTEND_APP_CLIENT_ID=$(grep '^VITE_AZURE_CLIENT_ID=' app/Frontend/.env | cut -d= -f2- | tr -d '\r')
          if [ -z "$FRONTEND_APP_CLIENT_ID" ]; then
            echo "::warning::No VITE_AZURE_CLIENT_ID found in app/Frontend/.env. Skipping automatic redirect URI registration."
            exit 0
          fi

          SITE_URL="https://${{ steps.names.outputs.web_app_name }}.azurewebsites.net"
          APP_OBJECT_ID=$(az ad app show --id "$FRONTEND_APP_CLIENT_ID" --query id -o tsv)

          SPA_REDIRECT_URIS=$(
            {
              printf '%s\n' "$SITE_URL"
              printf '%s/\n' "$SITE_URL"
              az ad app show --id "$FRONTEND_APP_CLIENT_ID" --query "spa.redirectUris[]" -o tsv
            } | grep -v '^$' | sort -u | jq -R . | jq -s .
          )

          WEB_REDIRECT_URIS=$(
            {
              printf '%s\n' "$SITE_URL"
              az ad app show --id "$FRONTEND_APP_CLIENT_ID" --query "web.redirectUris[]" -o tsv
            } | grep -v '^$' | sort -u | jq -R . | jq -s .
          )

          BODY=$(jq -cn --argjson spa "$SPA_REDIRECT_URIS" --argjson web "$WEB_REDIRECT_URIS" '{spa:{redirectUris:$spa},web:{redirectUris:$web}}')

          az rest \
            --method PATCH \
            --url "https://graph.microsoft.com/v1.0/applications/$APP_OBJECT_ID" \
            --headers "Content-Type=application/json" \
            --body "$BODY"

          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "::warning::Automatic Entra redirect URI registration failed. Check that the deployment service principal is an owner of the frontend app registration."
            exit 0
          fi

          echo "Registered redirect URIs for $SITE_URL"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    env:
      WEB_APP_NAME: ${{ needs.deploy-infrastructure.outputs.web_app_name }}
      RESOURCE_GROUP_NAME: ${{ needs.deploy-infrastructure.outputs.resource_group_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            app/Frontend/package-lock.json
            app/Backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./app/Frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./app/Frontend
        run: VITE_API_BASE="" npm run build

      - name: Install backend dependencies
        working-directory: ./app/Backend
        run: npm ci

      - name: Copy frontend build into backend public folder
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            mkdir -p app/Backend/public
            cp -R app/Frontend/dist/* app/Backend/public/

      - name: Package backend app
        working-directory: ./app/Backend
        run: zip -r ../../backend-app.zip . -x "node_modules/*"

      - name: Deploy package to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          package: backend-app.zip
