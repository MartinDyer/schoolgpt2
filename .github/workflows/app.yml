name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/schoolgpt-app:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/schoolgpt-app:${{ github.sha }}

      - name: Set Docker image/tag output
        run: |
          echo "DOCKER_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/schoolgpt-app" >> $GITHUB_ENV
          echo "DOCKER_TAG=${{ github.sha }}" >> $GITHUB_ENV 