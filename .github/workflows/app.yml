name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Key Vault - Get Secrets
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: schoolgptkv123
          secrets: 'acr-user,acr-pass'

      - name: Azure CLI login to ACR
        run: az acr login --name schoolgptacr123

      - name: Build Docker image
        run: |
          docker build -f WebApp.Dockerfile -t schoolgptacr123.azurecr.io/schoolgpt-app:${{ github.sha }} sample-app-aoai-chatGPT

      - name: Push Docker image
        run: |
          docker push schoolgptacr123.azurecr.io/schoolgpt-app:${{ github.sha }}

      - name: Set Docker image/tag output
        run: |
          echo "DOCKER_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/schoolgpt-app" >> $GITHUB_ENV
          echo "DOCKER_TAG=${{ github.sha }}" >> $GITHUB_ENV 

      - name: Get SQL connection string from Terraform output
        id: sql_conn
        run: |
          cd infra
          echo "SQL_CONN=$(terraform output -raw sql_connection_string)" >> $GITHUB_ENV

      - name: Set SQL connection string in App Service
        run: |
          az webapp config appsettings set \
            -g schoolgpt-rg \
            -n schoolgpt-webapp123 \
            --settings AZURE_SQL_SERVER_CONNECTION_STRING="${{ env.SQL_CONN }}" 