name: Build and Push Docker Image

on:
  workflow_run:
    workflows: ["Deploy Infrastructure"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR username from Key Vault
        id: acr-username
        uses: azure/keyvault-secrets@v1
        with:
          keyvault: schoolgptkv123
          secrets: acr-username

      - name: Fetch ACR password from Key Vault
        id: acr-password
        uses: azure/keyvault-secrets@v1
        with:
          keyvault: schoolgptkv123
          secrets: acr-password

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ steps.acr-username.outputs.acr-username }}
          password: ${{ steps.acr-password.outputs.acr-password }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/schoolgpt-app:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/schoolgpt-app:${{ github.sha }}

      - name: Set Docker image/tag output
        run: |
          echo "DOCKER_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/schoolgpt-app" >> $GITHUB_ENV
          echo "DOCKER_TAG=${{ github.sha }}" >> $GITHUB_ENV 

      - name: Get SQL connection string from Terraform output
        id: sql_conn
        run: |
          cd infra
          echo "SQL_CONN=$(terraform output -raw sql_connection_string)" >> $GITHUB_ENV

      - name: Set SQL connection string in App Service
        run: |
          az webapp config appsettings set \
            -g schoolgpt-rg \
            -n schoolgpt-webapp123 \
            --settings AZURE_SQL_SERVER_CONNECTION_STRING="${{ env.SQL_CONN }}" 