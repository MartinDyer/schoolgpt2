name: 🚀 06- Deploy Full App (React + Node) [LEGACY]

on:
  workflow_dispatch:

env:
  NODE_VERSION: "18.x"
  TF_WORKING_DIR: "./infra"

permissions:
  id-token: write
  contents: read

jobs:
  infrastructure:
    name: 🏗️ Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      web_app_name: ${{ steps.tf-output.outputs.web_app_name }}
      resource_group_name: ${{ steps.tf-output.outputs.resource_group_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Terraform Azure credentials
        run: |
          echo "ARM_CLIENT_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}" >> $GITHUB_ENV
          echo "TF_VAR_azure_tenant_id=${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
             # Add other vars as needed or rely on .tfvars if they are committed (not recommended for secrets)

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          WEB_APP_NAME=$(terraform output -raw web_app_name)
          RG_NAME=$(terraform output -raw resource_group_name)
          echo "web_app_name=$WEB_APP_NAME" >> $GITHUB_OUTPUT
          echo "resource_group_name=$RG_NAME" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: 📱 Build & Deploy App
    runs-on: ubuntu-latest
    needs: infrastructure
    env:
      WEB_APP_NAME: ${{ needs.infrastructure.outputs.web_app_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "app/*/package-lock.json"

      # --- Frontend Build ---
      - name: Install Frontend Dependencies
        working-directory: ./app/Frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./app/Frontend
        run: VITE_API_BASE="" npm run build

      # --- Backend Setup ---
      - name: Install Backend Dependencies
        working-directory: ./app/Backend
        run: npm ci

      # --- Combine ---
      - name: Copy Frontend Build to Backend
        run: |
          # Create public directory in backend
          mkdir -p app/Backend/public
          # Copy dist content to public
          cp -R app/Frontend/dist/* app/Backend/public/

      # --- Packaging ---
      - name: Create Backend Artifact (excluding node_modules)
        working-directory: ./app/Backend
        run: zip -r ../../backend-app.zip . -x "node_modules/*"

      # --- Deployment ---
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          package: backend-app.zip
