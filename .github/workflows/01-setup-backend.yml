name: 🔧 01 - Setup SchoolGPT Backend Storage

on:
  workflow_dispatch:
    inputs:
      school_name:
        description: 'School Name (e.g., Lincoln Elementary)'
        required: true
        type: string
      environment:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development

permissions:
  contents: write
  pull-requests: write

jobs:
  setup-backend:
    runs-on: ubuntu-latest
    outputs:
      storage_account_name: ${{ steps.create-backend.outputs.storage_account_name }}
      container_name: ${{ steps.create-backend.outputs.container_name }}
      
    steps:
      - name: 🏫 Welcome Message
        run: |
          echo "🏫 Setting up SchoolGPT for: ${{ github.event.inputs.school_name }}"
          echo "🌍 Environment: ${{ github.event.inputs.environment }}"
          echo "📦 This will create Azure Storage for Terraform state management"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🔧 Create Terraform Backend Storage
        id: create-backend
        run: |
          # Generate unique names for backend storage based on school
          # SCHOOL_PREFIX=$(echo "${{ github.event.inputs.school_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g' | cut -c1-8)
          SCHOOL_PREFIX=$(echo "Management-SA-${{ github.event.inputs.school_name }}")
          RANDOM_SUFFIX=$(openssl rand -hex 3)
          STORAGE_ACCOUNT="${SCHOOL_PREFIX}tfstate${RANDOM_SUFFIX}"
          
          # Create unique resource group names for this school
          MAIN_RESOURCE_GROUP="${SCHOOL_PREFIX}-${{ github.event.inputs.environment }}-rg"
          CONTAINER_NAME="tfstate"
          
          echo "🏗️ Creating backend storage for any school:"
          echo "  🏫 School: ${{ github.event.inputs.school_name }}"
          echo "  📦 Main Resource Group: $MAIN_RESOURCE_GROUP"
          echo "  💾 Storage Account: $STORAGE_ACCOUNT"
          echo "  📁 Container: $CONTAINER_NAME"
          echo "  🌍 Environment: ${{ github.event.inputs.environment }}"
          
          # Check if main resource group exists, if not create it
          if ! az group show --name "$MAIN_RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "📦 Creating main resource group: $MAIN_RESOURCE_GROUP"
            az group create --name "$MAIN_RESOURCE_GROUP" --location "uksouth" --tags \
              Environment="${{ github.event.inputs.environment }}" \
              School="${{ github.event.inputs.school_name }}" \
              Purpose="SchoolGPT Infrastructure"
          else
            echo "✅ Main resource group already exists: $MAIN_RESOURCE_GROUP"
          fi
          
          # Create storage account for Terraform state in the MAIN resource group
          echo "💾 Creating storage account for Terraform state..."
          az storage account create \
            --name "$STORAGE_ACCOUNT" \
            --resource-group "$MAIN_RESOURCE_GROUP" \
            --location "uksouth" \
            --sku Standard_LRS \
            --encryption-services blob \
            --https-only true \
            --min-tls-version TLS1_2 \
            --tags \
              Environment="${{ github.event.inputs.environment }}" \
              School="${{ github.event.inputs.school_name }}" \
              Purpose="Terraform State Storage"
          
          # Get storage account key
          ACCOUNT_KEY=$(az storage account keys list --resource-group "$MAIN_RESOURCE_GROUP" --account-name "$STORAGE_ACCOUNT" --query '[0].value' -o tsv)
          
          # Create blob container
          az storage container create \
            --name "$CONTAINER_NAME" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY"
          
          # Output for next jobs
          echo "storage_account_name=$STORAGE_ACCOUNT" >> $GITHUB_OUTPUT
          echo "container_name=$CONTAINER_NAME" >> $GITHUB_OUTPUT
          echo "resource_group_backend=$MAIN_RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "school_prefix=$SCHOOL_PREFIX" >> $GITHUB_OUTPUT

      - name: 📝 Update Configuration for This School
        run: |
          echo "🔧 Customizing configuration for: ${{ github.event.inputs.school_name }}"
          
          # Create dynamic backend configuration
          cat > infra/backend.tf << EOF
          terraform {
            backend "azurerm" {
              resource_group_name  = "${{ steps.create-backend.outputs.resource_group_backend }}"
              storage_account_name = "${{ steps.create-backend.outputs.storage_account_name }}"
              container_name       = "${{ steps.create-backend.outputs.container_name }}"
              key                  = "${{ github.event.inputs.environment }}.terraform.tfstate"
            }
          }
          EOF
          
          # Update terraform.tfvars with school-specific values if it contains placeholders
          if grep -q -E "(REPLACE_WITH_YOUR|REPLACE_AUTO_GENERATED|REPLACE_WITH_SCHOOL_NAME)" infra/terraform.tfvars 2>/dev/null; then
            echo "📝 Updating terraform.tfvars with school-specific values..."
            
            # Generate unique resource names for this school
            SCHOOL_PREFIX="${{ steps.create-backend.outputs.school_prefix }}"
            RANDOM_SUFFIX=$(openssl rand -hex 2)
            
            # Update terraform.tfvars with school-specific values
            sed -i "s/resource_group_name.*=.*/resource_group_name   = \"$MAIN_RESOURCE_GROUP\"/" infra/terraform.tfvars
            sed -i "s/school_name.*=.*/school_name = \"${{ github.event.inputs.school_name }}\"/" infra/terraform.tfvars
            sed -i "s/ai_foundry_name.*=.*/ai_foundry_name      = \"${SCHOOL_PREFIX}aifoundry${RANDOM_SUFFIX}\"/" infra/terraform.tfvars
            sed -i "s/ai_foundry_subdomain.*=.*/ai_foundry_subdomain = \"${SCHOOL_PREFIX}ai${RANDOM_SUFFIX}\"/" infra/terraform.tfvars
            sed -i "s/acr_name.*=.*/acr_name              = \"${SCHOOL_PREFIX}acr${RANDOM_SUFFIX}\"/" infra/terraform.tfvars
            sed -i "s/web_app_name.*=.*/web_app_name          = \"${SCHOOL_PREFIX}webapp${RANDOM_SUFFIX}\"/" infra/terraform.tfvars
            sed -i "s/sql_server_name.*=.*/sql_server_name       = \"${SCHOOL_PREFIX}sqlsrv${RANDOM_SUFFIX}\"/" infra/terraform.tfvars
            sed -i "s/key_vault_name.*=.*/key_vault_name            = \"${SCHOOL_PREFIX}kv${RANDOM_SUFFIX}\"/" infra/terraform.tfvars
            sed -i "s/acr_login_server.*=.*/acr_login_server      = \"${SCHOOL_PREFIX}acr${RANDOM_SUFFIX}.azurecr.io\"/" infra/terraform.tfvars
            
            echo "✅ Updated terraform.tfvars with unique names for ${{ github.event.inputs.school_name }}"
          fi
          
          echo "✅ Created backend.tf configuration:"
          cat infra/backend.tf
          
          echo ""
          echo "📋 Resource names for ${{ github.event.inputs.school_name }}:"
          echo "  🏫 School: ${{ github.event.inputs.school_name }}"
          echo "  📦 Resource Group: ${{ steps.create-backend.outputs.resource_group_backend }}"
          echo "  💾 Backend Storage: ${{ steps.create-backend.outputs.storage_account_name }}"

      - name: ✅ Backend Configuration Complete
        run: |
          echo "✅ Backend storage created successfully!"
          echo "Storage Account: ${{ steps.create-backend.outputs.storage_account_name }}"
          echo "Container: ${{ steps.create-backend.outputs.container_name }}"
          echo "Resource Group: ${{ steps.create-backend.outputs.resource_group_backend }}"
          echo ""
          echo "🔧 Backend configuration has been automatically saved to infra/backend.tf"
          echo "📦 Other workflows will automatically read this configuration - no manual setup needed!"

      - name: 📤 Commit School Configuration
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add infra/backend.tf infra/terraform.tfvars
          git add infra/AI-Foundry/backend.tf infra//AI-Foundry/terraform.tfvars
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🏫 Configure SchoolGPT for ${{ github.event.inputs.school_name }} (${{ github.event.inputs.environment }})"
            git push
          fi

      - name: 🎉 Setup Complete - Ready for Any School!
        run: |
          echo "🎉 SchoolGPT setup complete for ${{ github.event.inputs.school_name }}!"
          echo ""
          echo "✅ 100% Automated - Any school can use this template!"
          echo ""
          echo "🏫 What was created for ${{ github.event.inputs.school_name }}:"
          echo "  📦 Resource Group: ${{ steps.create-backend.outputs.resource_group_backend }}"
          echo "  💾 Backend Storage: ${{ steps.create-backend.outputs.storage_account_name }}"
          echo "  🔧 Custom Configuration: Automatically generated"
          echo ""
          echo "📋 Next Steps for ${{ github.event.inputs.school_name }}:"
          echo "1. Run '🔄 Import Existing Resources' workflow (if infrastructure already exists)"
          echo "2. Or run '🚀 Deploy SchoolGPT Infrastructure' workflow (for new deployment)"
          echo ""
          echo "🚀 This template is now ready for any school to use!"
          echo "   Each school gets their own unique resource names automatically!" 