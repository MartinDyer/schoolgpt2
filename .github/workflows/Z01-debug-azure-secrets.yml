name: Z01 - Debug Secret Presence

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      KEY_VAULT_ADMIN_OBJECT_ID: ${{ secrets.KEY_VAULT_ADMIN_OBJECT_ID }}

    steps:
      - name: Create safe JSON report
        shell: bash
        run: |
          cat > secrets-report.json <<EOF
          {
            "ACR_LOGIN_SERVER": "$( [ -n "$ACR_LOGIN_SERVER" ] && echo present || echo missing )",
            "AZURE_CREDENTIALS": "$( [ -n "$AZURE_CREDENTIALS" ] && echo present || echo missing )",
            "AZURE_TENANT_ID": "$( [ -n "$AZURE_TENANT_ID" ] && echo present || echo missing )",
            "AZURE_WEBAPP_PUBLISH_PROFILE": "$( [ -n "$AZURE_WEBAPP_PUBLISH_PROFILE" ] && echo present || echo missing )",
            "KEY_VAULT_ADMIN_OBJECT_ID": "$( [ -n "$KEY_VAULT_ADMIN_OBJECT_ID" ] && echo present || echo missing )"
          }
          EOF

          cat secrets-report.json

      - name: Upload safe report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-report
          path: secrets-report.json
