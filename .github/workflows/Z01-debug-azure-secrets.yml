name: Z01 - Debug Azure Secrets

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      KEY_VAULT_ADMIN_OBJECT_ID: ${{ secrets.KEY_VAULT_ADMIN_OBJECT_ID }}
      SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Show secret diagnostics safely
        shell: bash
        run: |
          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "$name: missing"
              return
            fi

            local len
            len=$(printf '%s' "$value" | wc -c | tr -d ' ')
            local trimmed_len
            trimmed_len=$(printf '%s' "$value" | tr -d '\r\n' | wc -c | tr -d ' ')
            local prefix
            local suffix
            prefix=$(printf '%s' "$value" | tr -d '\r\n' | cut -c1-4)
            suffix=$(printf '%s' "$value" | tr -d '\r\n' | rev | cut -c1-4 | rev)

            echo "$name: present"
            echo "$name length: $len"
            echo "$name trimmed-length: $trimmed_len"
            echo "$name trailing-newline: $([ "$len" != "$trimmed_len" ] && echo yes || echo no)"
            echo "$name preview: ${prefix}...${suffix}"
          }

          check_secret "AZURE_TENANT_ID" "$AZURE_TENANT_ID"
          check_secret "KEY_VAULT_ADMIN_OBJECT_ID" "$KEY_VAULT_ADMIN_OBJECT_ID"
          check_secret "SQL_ADMIN_PASSWORD" "$SQL_ADMIN_PASSWORD"

      - name: Show Azure account context
        shell: bash
        run: |
          az account show --query '{subscriptionId:id, tenantId:tenantId, user:user.name}' -o json

      - name: Resolve service principal object ID from login
        shell: bash
        run: |
          CLIENT_ID=$(jq -r '.clientId' <<< "$AZURE_CREDENTIALS")
          echo "Client ID preview: ${CLIENT_ID:0:4}...${CLIENT_ID: -4}"
          SP_OBJECT_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)
          echo "Service principal object ID preview: ${SP_OBJECT_ID:0:4}...${SP_OBJECT_ID: -4}"
          echo "Service principal object ID length: $(printf '%s' "$SP_OBJECT_ID" | wc -c | tr -d ' ')"

      - name: Compare configured Key Vault object ID to service principal object ID
        shell: bash
        run: |
          CLIENT_ID=$(jq -r '.clientId' <<< "$AZURE_CREDENTIALS")
          SP_OBJECT_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)
          SECRET_ID=$(printf '%s' "$KEY_VAULT_ADMIN_OBJECT_ID" | tr -d '\r\n')

          if [ -z "$SECRET_ID" ]; then
            echo "KEY_VAULT_ADMIN_OBJECT_ID is missing"
            exit 0
          fi

          if [ "$SECRET_ID" = "$SP_OBJECT_ID" ]; then
            echo "KEY_VAULT_ADMIN_OBJECT_ID matches the logged-in service principal object ID"
          else
            echo "KEY_VAULT_ADMIN_OBJECT_ID does not match the logged-in service principal object ID"
          fi
