name: 🚀 04- Deploy React & Node to Azure App Service [LEGACY]

on:
  workflow_dispatch:

env:
  NODE_VERSION: "18.x"
  AZURE_WEBAPP_NAME: "your-webapp-name-here" # <-- change this to your App Service name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/Frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./app/Frontend
        run: npm ci

      - name: Build app
        working-directory: ./app/Frontend
        run: npm run build --if-present

      - name: Run tests
        working-directory: ./app/Frontend
        run: npm test --if-present

      - name: Archive app for deployment
        working-directory: ./app/Frontend
        run: |
          zip -r frontend.zip . -x "*.git*"

      # Optional: debug – show files
      - name: List files
        run: ls -R

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: School-Safe-GPT-FE-1234
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./app/Frontend/frontend.zip
