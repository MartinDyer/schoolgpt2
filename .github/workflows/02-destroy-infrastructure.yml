name: 🗑️ Destroy SchoolGPT Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
        - staging
        - development
        - production
      school_name:
        description: 'School Name (must match deployment)'
        required: true
        type: string
      confirmation:
        description: 'Type "DESTROY" to confirm (case sensitive)'
        required: true
        type: string
      destroy_backend:
        description: 'Also destroy Terraform backend storage (CAUTION: This removes state files!)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Safety Confirmation Check
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo "❌ Safety confirmation failed!"
            echo "You must type 'DESTROY' exactly to confirm destruction."
            exit 1
          fi
          
          echo "⚠️  DANGER ZONE ⚠️"
          echo "This will PERMANENTLY DESTROY all SchoolGPT resources for:"
          echo "🏫 School: ${{ github.event.inputs.school_name }}"
          echo "🌍 Environment: ${{ github.event.inputs.environment }}"
          echo "🗑️ Backend Storage: ${{ github.event.inputs.destroy_backend }}"
          echo ""
          echo "✅ Safety confirmation passed"

      - name: 🚫 Production Warning
        if: github.event.inputs.environment == 'production'
        run: |
          echo "🚨 WARNING: You are about to destroy PRODUCTION environment!"
          echo "This will affect live users and cannot be undone!"
          echo "Please ensure this is intentional."
          sleep 10

  destroy:
    runs-on: ubuntu-latest
    needs: safety-check
    environment: 
      name: ${{ github.event.inputs.environment }}-destroy
      url: https://portal.azure.com
    
    steps:
      - name: 🗑️ Starting Destruction Process
        run: |
          echo "🗑️ Starting destruction of SchoolGPT infrastructure"
          echo "🏫 School: ${{ github.event.inputs.school_name }}"
          echo "🌍 Environment: ${{ github.event.inputs.environment }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Terraform Azure credentials
        run: |
          echo "ARM_CLIENT_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}" >> $GITHUB_ENV

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: 🔧 Read Backend Configuration
        id: backend-config
        run: |
          echo "🔍 Reading backend configuration from backend.tf..."
          cd infra
          
          if [ ! -f "backend.tf" ]; then
            echo "❌ Backend configuration not found!"
            echo "Please run the 'Setup SchoolGPT Backend Storage' workflow first."
            exit 1
          fi
          
          # Extract backend configuration from backend.tf
          RESOURCE_GROUP_BACKEND=$(grep -o 'resource_group_name *= *"[^"]*"' backend.tf | cut -d'"' -f2)
          STORAGE_ACCOUNT=$(grep -o 'storage_account_name *= *"[^"]*"' backend.tf | cut -d'"' -f2)
          CONTAINER_NAME=$(grep -o 'container_name *= *"[^"]*"' backend.tf | cut -d'"' -f2)
          
          echo "✅ Backend configuration found:"
          echo "  Resource Group: $RESOURCE_GROUP_BACKEND"
          echo "  Storage Account: $STORAGE_ACCOUNT"
          echo "  Container: $CONTAINER_NAME"
          
          # Set outputs for next steps
          echo "resource_group_backend=$RESOURCE_GROUP_BACKEND" >> $GITHUB_OUTPUT
          echo "storage_account=$STORAGE_ACCOUNT" >> $GITHUB_OUTPUT
          echo "container_name=$CONTAINER_NAME" >> $GITHUB_OUTPUT

      - name: 📋 Validate Configuration
        run: |
          cd infra
          echo "📋 Validating terraform.tfvars configuration..."
          
          if [ ! -f "terraform.tfvars" ]; then
            echo "❌ terraform.tfvars not found!"
            echo "Please ensure terraform.tfvars is configured before destroying."
            exit 1
          fi
          
          # Check for placeholder values
          if grep -q "REPLACE_AUTO_GENERATED\|REPLACE_WITH_" terraform.tfvars; then
            echo "⚠️ Warning: terraform.tfvars contains placeholder values"
            echo "This might indicate incomplete configuration"
          fi
          
          echo "✅ Configuration validation completed"

      - name: Terraform Init
        run: |
          cd infra
          echo "🔄 Initializing Terraform with backend..."
          terraform init \
            -backend-config="resource_group_name=${{ steps.backend-config.outputs.resource_group_backend }}" \
            -backend-config="storage_account_name=${{ steps.backend-config.outputs.storage_account }}" \
            -backend-config="container_name=${{ steps.backend-config.outputs.container_name }}" \
            -backend-config="key=${{ github.event.inputs.environment }}.terraform.tfstate"

      - name: 📋 Show Current Resources
        run: |
          cd infra
          echo "📋 Current resources that will be destroyed:"
          terraform show || echo "No resources found or state file missing"

      - name: Terraform Destroy Plan
        run: |
          cd infra
          echo "📋 Creating destruction plan..."
          terraform plan -destroy \
            -var-file=terraform.tfvars \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="school_name=${{ github.event.inputs.school_name }}" \
            -out=destroy.tfplan \
            -no-color

      - name: ⏸️ Final Confirmation
        run: |
          echo "⏸️ This is your FINAL CHANCE to abort!"
          echo "The following resources will be PERMANENTLY DESTROYED:"
          echo ""
          echo "🏫 School: ${{ github.event.inputs.school_name }}"
          echo "🌍 Environment: ${{ github.event.inputs.environment }}"
          echo ""
          echo "Proceeding with destruction in 30 seconds..."
          echo "Cancel this workflow now if you want to abort!"
          sleep 30

      - name: 🗑️ Execute Terraform Destroy
        run: |
          cd infra
          echo "🗑️ Executing Terraform destroy..."
          terraform apply destroy.tfplan

      - name: 🗑️ Destroy Backend Storage
        if: github.event.inputs.destroy_backend == 'true' || github.event.inputs.destroy_backend == true
        run: |
          echo "🗑️ Destroying Terraform backend storage..."
          echo "⚠️  This will remove ALL state files for ALL environments!"
          
          # Use the backend configuration we read earlier
          BACKEND_RG="${{ steps.backend-config.outputs.resource_group_backend }}"
          STORAGE_ACCOUNT="${{ steps.backend-config.outputs.storage_account }}"
          
          echo "Backend Resource Group: $BACKEND_RG"
          echo "Storage Account: $STORAGE_ACCOUNT"
          
          if az group exists --name "$BACKEND_RG"; then
            echo "🗑️ Deleting backend resource group: $BACKEND_RG"
            echo "This contains storage account: $STORAGE_ACCOUNT"
            az group delete --name "$BACKEND_RG" --yes --no-wait
            echo "✅ Backend storage deletion initiated"
          else
            echo "ℹ️ Backend resource group not found or already deleted"
          fi

      - name: 🧹 Cleanup Local Files
        run: |
          echo "🧹 Cleaning up backend configuration..."
          if [ -f "infra/backend.tf" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            rm -f infra/backend.tf
            git add infra/backend.tf
            git commit -m "🗑️ Remove backend configuration after destruction" || echo "No changes to commit"
            git push || echo "Nothing to push"
          fi

      - name: 📊 Destruction Summary
        run: |
          echo "✅ SchoolGPT destruction completed!"
          echo ""
          echo "🗑️ Destroyed resources for:"
          echo "🏫 School: ${{ github.event.inputs.school_name }}"
          echo "🌍 Environment: ${{ github.event.inputs.environment }}"
          echo "🗑️ Backend Storage: ${{ github.event.inputs.destroy_backend }}"
          echo ""
          echo "ℹ️ Next Steps:"
          if [ "${{ github.event.inputs.destroy_backend }}" == "true" ]; then
            echo "- Run 'Setup SchoolGPT Backend Storage' if you want to deploy again"
          fi
          echo "- All Azure resources have been removed"
          echo "- No ongoing costs will be incurred"

      - name: 📝 Create Destruction Report
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## 🗑️ SchoolGPT Infrastructure Destruction Report
            
            **School:** \`${{ github.event.inputs.school_name }}\`
            **Environment:** \`${{ github.event.inputs.environment }}\`
            **Backend Storage Destroyed:** \`${{ github.event.inputs.destroy_backend }}\`
            **Destroyed By:** @${{ github.actor }}
            **Timestamp:** ${new Date().toISOString()}
            
            ### ✅ Destruction Completed Successfully
            
            All SchoolGPT infrastructure resources have been permanently removed from Azure.
            
            ${{ github.event.inputs.destroy_backend == 'true' && '⚠️ **Backend storage was also destroyed** - you will need to run the setup workflow again before deploying.' || 'ℹ️ Backend storage was preserved for future deployments.' }}
            
            ### Next Steps
            - All Azure resources have been cleaned up
            - No ongoing costs will be incurred
            ${{ github.event.inputs.destroy_backend == 'true' && '- Run "Setup SchoolGPT Backend Storage" workflow to deploy again' || '- Infrastructure can be redeployed using existing backend' }}
            `;
            
            // You could create an issue or comment here if needed
            console.log(output); 