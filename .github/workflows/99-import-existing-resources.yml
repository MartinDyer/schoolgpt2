name: 🔄 Import Existing Resources

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to import for'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development
      school_name:
        description: 'School Name (must match the one used when creating resources)'
        required: true
        type: string
      resource_group_name:
        description: 'Actual Resource Group name to import (e.g., schoolgpt-rg)'
        required: true
        type: string
      force_import:
        description: 'Force import even if some resources already exist in state'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  import-resources:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: 🔄 Starting Resource Import
        run: |
          echo "🔄 Importing existing resources for: ${{ github.event.inputs.school_name }}"
          echo "🌍 Environment: ${{ github.event.inputs.environment }}"
          echo "📦 Resource Group: ${{ github.event.inputs.resource_group_name }}"
          echo "⚡ Force Import: ${{ github.event.inputs.force_import }}"
          echo ""
          echo "This will discover and import your existing Azure resources into Terraform remote state"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Terraform Azure credentials
        run: |
          echo "ARM_CLIENT_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}" >> $GITHUB_ENV

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: 🔧 Ensure Backend Storage Exists
        run: |
          cd infra
          
          # Check if backend.tf exists
          if [ ! -f "backend.tf" ]; then
            echo "❌ Backend configuration not found!"
            echo "Please run the 'Setup SchoolGPT Backend Storage' workflow first."
            exit 1
          fi
          
          echo "✅ Backend configuration found"
          cat backend.tf

      - name: 🔧 Read Backend Configuration
        id: backend-config
        run: |
          echo "🔍 Reading backend configuration from backend.tf..."
          cd infra
          
          if [ ! -f "backend.tf" ]; then
            echo "❌ Backend configuration not found!"
            echo "Please run the 'Setup SchoolGPT Backend Storage' workflow first."
            exit 1
          fi
          
          # Extract backend configuration from backend.tf
          RESOURCE_GROUP_BACKEND=$(grep -o 'resource_group_name *= *"[^"]*"' backend.tf | cut -d'"' -f2)
          STORAGE_ACCOUNT=$(grep -o 'storage_account_name *= *"[^"]*"' backend.tf | cut -d'"' -f2)
          CONTAINER_NAME=$(grep -o 'container_name *= *"[^"]*"' backend.tf | cut -d'"' -f2)
          
          echo "✅ Backend configuration found:"
          echo "  Resource Group: $RESOURCE_GROUP_BACKEND"
          echo "  Storage Account: $STORAGE_ACCOUNT"
          echo "  Container: $CONTAINER_NAME"
          
          # Set outputs for next steps
          echo "resource_group_backend=$RESOURCE_GROUP_BACKEND" >> $GITHUB_OUTPUT
          echo "storage_account=$STORAGE_ACCOUNT" >> $GITHUB_OUTPUT
          echo "container_name=$CONTAINER_NAME" >> $GITHUB_OUTPUT

      - name: Terraform Init with Backend
        run: |
          cd infra
          echo "🔄 Initializing Terraform with remote backend..."
          terraform init \
            -backend-config="resource_group_name=${{ steps.backend-config.outputs.resource_group_backend }}" \
            -backend-config="storage_account_name=${{ steps.backend-config.outputs.storage_account }}" \
            -backend-config="container_name=${{ steps.backend-config.outputs.container_name }}" \
            -backend-config="key=${{ github.event.inputs.environment }}.terraform.tfstate"

      - name: 🔍 Check Existing Resources in Azure
        id: check-resources
        run: |
          cd infra
          
          # Use provided resource group name and subscription from terraform.tfvars
          RESOURCE_GROUP="${{ github.event.inputs.resource_group_name }}"
          SUBSCRIPTION_ID=$(grep -E '^azure_subscription_id' terraform.tfvars | cut -d'"' -f2)
          
          echo "🔍 Checking for existing resources..."
          echo "Resource Group: $RESOURCE_GROUP"
          echo "Subscription: $SUBSCRIPTION_ID"
          echo "School Name: ${{ github.event.inputs.school_name }}"
          
          # Check if resource group exists
          if az group show --name "$RESOURCE_GROUP" --subscription "$SUBSCRIPTION_ID" >/dev/null 2>&1; then
            echo "✅ Resource group exists: $RESOURCE_GROUP"
            echo "resource_group_exists=true" >> $GITHUB_OUTPUT
            echo "resource_group_name=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
            
            # List all resources in the group
            echo "📋 Resources found in $RESOURCE_GROUP:"
            az resource list --resource-group "$RESOURCE_GROUP" --subscription "$SUBSCRIPTION_ID" --query '[].{Name:name, Type:type}' -o table
            
            # Discover actual resource names from Azure (instead of terraform.tfvars placeholders)
            echo "🔍 Discovering actual resource names..."
            
            # More robust discovery with detailed logging
            echo "  🤖 Checking for AI Foundry (Cognitive Services)..."
            AI_FOUNDRY_NAME=$(az cognitiveservices account list --resource-group "$RESOURCE_GROUP" --query '[?kind==`OpenAI`].name | [0]' -o tsv 2>/dev/null || echo "")
            echo "    Found: ${AI_FOUNDRY_NAME:-'❌ Not found'}"
            
            echo "  📦 Checking for Container Registry..."
            ACR_NAME=$(az acr list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv 2>/dev/null || echo "")
            echo "    Found: ${ACR_NAME:-'❌ Not found'}"
            
            echo "  🌐 Checking for Web App..."
            WEB_APP_NAME=$(az webapp list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv 2>/dev/null || echo "")
            echo "    Found: ${WEB_APP_NAME:-'❌ Not found'}"
            
            echo "  🗄️ Checking for SQL Server..."
            SQL_SERVER_NAME=$(az sql server list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv 2>/dev/null || echo "")
            echo "    Found: ${SQL_SERVER_NAME:-'❌ Not found'}"
            
            echo "  🔐 Checking for Key Vault..."
            KEY_VAULT_NAME=$(az keyvault list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv 2>/dev/null || echo "")
            echo "    Found: ${KEY_VAULT_NAME:-'❌ Not found'}"
            
            echo "  📋 Checking for App Service Plan..."
            APP_SERVICE_PLAN_NAME=$(az appservice plan list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv 2>/dev/null || echo "")
            echo "    Found: ${APP_SERVICE_PLAN_NAME:-'❌ Not found'}"
            
            # Generate fallback names for missing resources based on school name
            SCHOOL_SAFE_NAME=$(echo "${{ github.event.inputs.school_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
            
            # Set fallback values for empty discoveries
            if [ -z "$AI_FOUNDRY_NAME" ]; then
              AI_FOUNDRY_NAME="${SCHOOL_SAFE_NAME}aifoundry$(date +%s | tail -c 4)"
              echo "  ⚠️ AI Foundry not found - will use fallback: $AI_FOUNDRY_NAME"
            fi
            
            if [ -z "$ACR_NAME" ]; then
              ACR_NAME="${SCHOOL_SAFE_NAME}acr$(date +%s | tail -c 4)"
              echo "  ⚠️ Container Registry not found - will use fallback: $ACR_NAME"
            fi
            
            if [ -z "$WEB_APP_NAME" ]; then
              WEB_APP_NAME="${SCHOOL_SAFE_NAME}webapp$(date +%s | tail -c 4)"
              echo "  ⚠️ Web App not found - will use fallback: $WEB_APP_NAME"
            fi
            
            if [ -z "$SQL_SERVER_NAME" ]; then
              SQL_SERVER_NAME="${SCHOOL_SAFE_NAME}sql$(date +%s | tail -c 4)"
              echo "  ⚠️ SQL Server not found - will use fallback: $SQL_SERVER_NAME"
            fi
            
            if [ -z "$KEY_VAULT_NAME" ]; then
              KEY_VAULT_NAME="${SCHOOL_SAFE_NAME}kv$(date +%s | tail -c 4)"
              echo "  ⚠️ Key Vault not found - will use fallback: $KEY_VAULT_NAME"
            fi
            
            if [ -z "$APP_SERVICE_PLAN_NAME" ]; then
              APP_SERVICE_PLAN_NAME="${SCHOOL_SAFE_NAME}-asp"
              echo "  ⚠️ App Service Plan not found - will use fallback: $APP_SERVICE_PLAN_NAME"
            fi
            
            echo "discovered_ai_foundry=$AI_FOUNDRY_NAME" >> $GITHUB_OUTPUT
            echo "discovered_acr=$ACR_NAME" >> $GITHUB_OUTPUT  
            echo "discovered_webapp=$WEB_APP_NAME" >> $GITHUB_OUTPUT
            echo "discovered_sql_server=$SQL_SERVER_NAME" >> $GITHUB_OUTPUT
            echo "discovered_key_vault=$KEY_VAULT_NAME" >> $GITHUB_OUTPUT
            echo "discovered_app_plan=$APP_SERVICE_PLAN_NAME" >> $GITHUB_OUTPUT
            
            # Track which resources actually exist for import
            AI_EXISTS=$(az cognitiveservices account show --resource-group "$RESOURCE_GROUP" --name "$AI_FOUNDRY_NAME" >/dev/null 2>&1 && echo "true" || echo "false")
            ACR_EXISTS=$(az acr show --resource-group "$RESOURCE_GROUP" --name "$ACR_NAME" >/dev/null 2>&1 && echo "true" || echo "false")
            WEBAPP_EXISTS=$(az webapp show --resource-group "$RESOURCE_GROUP" --name "$WEB_APP_NAME" >/dev/null 2>&1 && echo "true" || echo "false")
            SQL_EXISTS=$(az sql server show --resource-group "$RESOURCE_GROUP" --name "$SQL_SERVER_NAME" >/dev/null 2>&1 && echo "true" || echo "false")
            KV_EXISTS=$(az keyvault show --resource-group "$RESOURCE_GROUP" --name "$KEY_VAULT_NAME" >/dev/null 2>&1 && echo "true" || echo "false")
            ASP_EXISTS=$(az appservice plan show --resource-group "$RESOURCE_GROUP" --name "$APP_SERVICE_PLAN_NAME" >/dev/null 2>&1 && echo "true" || echo "false")
            
            echo "ai_exists=$AI_EXISTS" >> $GITHUB_OUTPUT
            echo "acr_exists=$ACR_EXISTS" >> $GITHUB_OUTPUT
            echo "webapp_exists=$WEBAPP_EXISTS" >> $GITHUB_OUTPUT
            echo "sql_exists=$SQL_EXISTS" >> $GITHUB_OUTPUT
            echo "kv_exists=$KV_EXISTS" >> $GITHUB_OUTPUT
            echo "asp_exists=$ASP_EXISTS" >> $GITHUB_OUTPUT
            
            echo "📋 Discovered resources:"
            echo "  AI Foundry: $AI_FOUNDRY_NAME"
            echo "  Container Registry: $ACR_NAME"
            echo "  Web App: $WEB_APP_NAME" 
            echo "  SQL Server: $SQL_SERVER_NAME"
            echo "  Key Vault: $KEY_VAULT_NAME"
            echo "  App Service Plan: $APP_SERVICE_PLAN_NAME"
          else
            echo "❌ Resource group not found: $RESOURCE_GROUP"
            echo "resource_group_exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Update terraform.tfvars with Discovered Resources
        if: steps.check-resources.outputs.resource_group_exists == 'true'
        run: |
          cd infra
          echo "📝 Updating terraform.tfvars with discovered resource names..."
          
          # Update terraform.tfvars with actual discovered resource names
          echo "📝 Updating terraform.tfvars with discovered/fallback values..."
          
          sed -i "s/resource_group_name.*=.*/resource_group_name   = \"${{ github.event.inputs.resource_group_name }}\"/" terraform.tfvars
          sed -i "s/school_name.*=.*/school_name = \"${{ github.event.inputs.school_name }}\"/" terraform.tfvars
          sed -i "s/ai_foundry_name.*=.*/ai_foundry_name      = \"${{ steps.check-resources.outputs.discovered_ai_foundry }}\"/" terraform.tfvars
          sed -i "s/acr_name.*=.*/acr_name              = \"${{ steps.check-resources.outputs.discovered_acr }}\"/" terraform.tfvars
          sed -i "s/web_app_name.*=.*/web_app_name          = \"${{ steps.check-resources.outputs.discovered_webapp }}\"/" terraform.tfvars
          sed -i "s/sql_server_name.*=.*/sql_server_name       = \"${{ steps.check-resources.outputs.discovered_sql_server }}\"/" terraform.tfvars
          sed -i "s/key_vault_name.*=.*/key_vault_name            = \"${{ steps.check-resources.outputs.discovered_key_vault }}\"/" terraform.tfvars
          sed -i "s/acr_login_server.*=.*/acr_login_server      = \"${{ steps.check-resources.outputs.discovered_acr }}.azurecr.io\"/" terraform.tfvars
          
          # Also update subdomain (derived from ai_foundry_name)
          AI_SUBDOMAIN=$(echo "${{ steps.check-resources.outputs.discovered_ai_foundry }}" | sed 's/[^a-z0-9]//g' | cut -c1-24)
          sed -i "s/ai_foundry_subdomain.*=.*/ai_foundry_subdomain = \"${AI_SUBDOMAIN}\"/" terraform.tfvars
          
          echo "✅ Updated terraform.tfvars:"
          echo "  Resource Group: ${{ github.event.inputs.resource_group_name }}"
          echo "  School Name: ${{ github.event.inputs.school_name }}"
          echo "  AI Foundry: ${{ steps.check-resources.outputs.discovered_ai_foundry }}"
          echo "  ACR: ${{ steps.check-resources.outputs.discovered_acr }}"
          echo "  Web App: ${{ steps.check-resources.outputs.discovered_webapp }}"
          echo "  SQL Server: ${{ steps.check-resources.outputs.discovered_sql_server }}"
          echo "  Key Vault: ${{ steps.check-resources.outputs.discovered_key_vault }}"
          
          echo "✅ Updated terraform.tfvars with discovered values"

      - name: 🔄 Import Resources into Terraform State
        if: steps.check-resources.outputs.resource_group_exists == 'true'
        run: |
          cd infra
          
          # Use discovered resource names from previous step and inputs
          RESOURCE_GROUP="${{ github.event.inputs.resource_group_name }}"
          SUBSCRIPTION_ID=$(grep -E '^azure_subscription_id' terraform.tfvars | cut -d'"' -f2)
          AI_FOUNDRY_NAME="${{ steps.check-resources.outputs.discovered_ai_foundry }}"
          ACR_NAME="${{ steps.check-resources.outputs.discovered_acr }}"
          APP_SERVICE_PLAN_NAME="${{ steps.check-resources.outputs.discovered_app_plan }}"
          WEB_APP_NAME="${{ steps.check-resources.outputs.discovered_webapp }}"
          SQL_SERVER_NAME="${{ steps.check-resources.outputs.discovered_sql_server }}"
          SQL_DB_NAME=$(grep -E '^sql_db_name' terraform.tfvars | cut -d'"' -f2)
          KEY_VAULT_NAME="${{ steps.check-resources.outputs.discovered_key_vault }}"
          APP_INSIGHTS_NAME=$(grep -E '^app_insights_name' terraform.tfvars | cut -d'"' -f2)
          
          echo "🔄 Starting import process..."
          
          # Function to safely import a resource
          import_resource() {
            local terraform_address=$1
            local azure_resource_id=$2
            local resource_name=$3
            
            echo "🔄 Importing $resource_name..."
            
            # Check if resource exists in Azure
            if az resource show --ids "$azure_resource_id" >/dev/null 2>&1; then
              echo "✅ Found $resource_name in Azure"
              
              # Try to import
              if terraform import -var-file=terraform.tfvars "$terraform_address" "$azure_resource_id" 2>/dev/null; then
                echo "✅ Successfully imported $resource_name"
              else
                echo "⚠️ $resource_name may already be in state or import failed (this is often OK)"
              fi
            else
              echo "❌ $resource_name not found in Azure, skipping..."
            fi
            echo ""
          }
          
          # Import resources in dependency order
          echo "📋 Importing resources in correct order..."
          
          # 1. Resource Group
          import_resource "azurerm_resource_group.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP" \
            "Resource Group"
          
          # 2. AI Foundry (Cognitive Account)
          import_resource "azurerm_cognitive_account.ai_foundry" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.CognitiveServices/accounts/$AI_FOUNDRY_NAME" \
            "AI Foundry"
          
          # 3. Container Registry
          import_resource "azurerm_container_registry.acr" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.ContainerRegistry/registries/$ACR_NAME" \
            "Container Registry"
          
          # 4. App Service Plan
          import_resource "azurerm_service_plan.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.Web/serverfarms/$APP_SERVICE_PLAN_NAME" \
            "App Service Plan"
          
          # 5. Web App
          import_resource "azurerm_linux_web_app.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.Web/sites/$WEB_APP_NAME" \
            "Web App"
          
          # 6. SQL Server
          import_resource "azurerm_mssql_server.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.Sql/servers/$SQL_SERVER_NAME" \
            "SQL Server"
          
          # 7. SQL Database
          import_resource "azurerm_mssql_database.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.Sql/servers/$SQL_SERVER_NAME/databases/$SQL_DB_NAME" \
            "SQL Database"
          
          # 8. Key Vault
          import_resource "azurerm_key_vault.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.KeyVault/vaults/$KEY_VAULT_NAME" \
            "Key Vault"
          
          # 9. Application Insights
          import_resource "azurerm_application_insights.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.Insights/components/$APP_INSIGHTS_NAME" \
            "Application Insights"
          
          # 10. Log Analytics Workspace (may have auto-generated name)
          LOG_WORKSPACE_NAME="${RESOURCE_GROUP}-logs"
          import_resource "azurerm_log_analytics_workspace.main" \
            "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.OperationalInsights/workspaces/$LOG_WORKSPACE_NAME" \
            "Log Analytics Workspace"
          
          echo "✅ Import process completed!"

      - name: 🧪 Validate State After Import
        continue-on-error: true
        id: validate
        run: |
          cd infra
          echo "🧪 Validating Terraform state after import..."
          
          # Show current state
          echo "📋 Current Terraform state:"
          terraform state list
          
          echo ""
          echo "🔍 Running Terraform plan to check for differences..."
          terraform plan -var-file=terraform.tfvars -detailed-exitcode
          
          PLAN_EXIT_CODE=$?
          if [ $PLAN_EXIT_CODE -eq 0 ]; then
            echo "✅ Perfect! No changes needed - all resources are properly imported"
            echo "validation_result=success" >> $GITHUB_OUTPUT
          elif [ $PLAN_EXIT_CODE -eq 2 ]; then
            echo "⚠️ Some differences detected - this is normal after import"
            echo "Run the Deploy Infrastructure workflow to sync any configuration differences"
            echo "validation_result=changes_detected" >> $GITHUB_OUTPUT
          else
            echo "❌ Terraform plan failed"
            echo "validation_result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: 📊 Validation Results
        run: |
          if [ "${{ steps.validate.outputs.validation_result }}" = "success" ]; then
            echo "✅ Validation successful - no changes needed"
          elif [ "${{ steps.validate.outputs.validation_result }}" = "changes_detected" ]; then
            echo "⚠️ Validation completed with differences detected"
            echo "This is normal after import - configuration differences may exist"
          else
            echo "❌ Validation failed - check logs above"
            exit 1
          fi

      - name: 🎉 Import Complete
        run: |
          echo "🎉 Resource import completed successfully!"
          echo ""
          echo "✅ Your existing Azure resources have been imported into Terraform remote state"
          echo ""
          echo "📋 Next Steps:"
          echo "1. Your resources are now managed by Terraform remote state"
          echo "2. You can now run the 'Deploy SchoolGPT Infrastructure' workflow normally"
          echo "3. Any future changes will be tracked and managed through CI/CD"
          echo ""
          echo "🔄 You can now safely use the automated deployment workflows!" 